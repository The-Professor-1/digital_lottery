name: Deploy Car Lottery

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "Starting CarLottery deployment..."
            cd /home/ubuntu/apps/CarLottery

            git fetch origin
            if git show-ref --quiet refs/remotes/origin/main; then
              BRANCH=main
            elif git show-ref --quiet refs/remotes/origin/master; then
              BRANCH=master
            else
              echo "Neither origin/main nor origin/master exists"
              exit 1
            fi

            echo "Using branch: $BRANCH"
            git reset --hard origin/$BRANCH
            git log -1 --oneline

            source venv/bin/activate
            pip install -r requirements.txt

            cd frontend
            npm ci
            npm run build
            cd ..

            cd backend
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            cd ..

            sudo systemctl daemon-reload
            sudo systemctl restart carlottery-gunicorn || sudo systemctl restart gunicorn
            sudo systemctl restart redis || true
            sudo systemctl restart celery || true
            sudo systemctl restart celery-beat || true
            sudo systemctl restart carlottery-telegram-bot || true

            echo "Deployment completed successfully"
