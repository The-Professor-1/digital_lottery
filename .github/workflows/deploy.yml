name: Deploy Car Lottery

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 30m
          script_stop: true
          script: |
            set -euo pipefail
            APP_DIR="$HOME/apps/CarLottery"
            VENV_PY="$APP_DIR/venv/bin/python"

            echo "Starting CarLottery deployment..."
            cd "$APP_DIR"

            if [ ! -x "$VENV_PY" ]; then
              echo "ERROR: venv python missing at $VENV_PY"
              exit 1
            fi

            echo "Using Python: $($VENV_PY --version)"

            git fetch origin
            if git show-ref --quiet refs/remotes/origin/main; then
              BRANCH=main
            elif git show-ref --quiet refs/remotes/origin/master; then
              BRANCH=master
            else
              echo "Neither origin/main nor origin/master exists"
              exit 1
            fi

            echo "Using branch: $BRANCH"
            git reset --hard "origin/$BRANCH"
            git log -1 --oneline

            # uv venv often has no pip binary — prefer uv, else python -m pip
            export PATH="$HOME/.local/bin:$PATH"
            if command -v uv >/dev/null 2>&1; then
              echo "Installing deps with uv pip..."
              uv pip install --python "$VENV_PY" -r requirements.txt
            elif "$VENV_PY" -m pip --version >/dev/null 2>&1; then
              echo "Installing deps with python -m pip..."
              "$VENV_PY" -m pip install -r requirements.txt
            else
              echo "Bootstrapping pip into venv..."
              "$VENV_PY" -m ensurepip --upgrade
              "$VENV_PY" -m pip install -r requirements.txt
            fi

            # Clear both possible Vite output folders so Django never serves a stale build
            rm -rf frontend_dist backend/frontend_dist

            cd frontend
            npm ci
            npm run build
            cd ..

            if [ ! -f backend/frontend_dist/index.html ]; then
              echo "ERROR: frontend build missing at backend/frontend_dist/index.html"
              exit 1
            fi
            echo "Frontend build OK: $(ls -la backend/frontend_dist/index.html)"

            cd backend
            "$VENV_PY" manage.py migrate --noinput
            "$VENV_PY" manage.py collectstatic --noinput
            cd ..

            sudo systemctl daemon-reload
            sudo systemctl restart carlottery-gunicorn || true
            sudo systemctl restart redis-server || sudo systemctl restart redis || true
            sudo systemctl restart celery || true
            sudo systemctl restart celery-beat || true
            sudo systemctl restart carlottery-telegram-bot || true

            echo "Deployment completed successfully"
            echo "Active frontend_dist tip: ensure nginx proxies /media/ to gunicorn"
