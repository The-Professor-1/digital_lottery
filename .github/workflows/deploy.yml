name: Deploy Bingo App

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            echo "🚀 Starting deployment..."

            cd /home/ubuntu/apps/good-bingo/arif_bingo

            echo "📥 Updating repository..."
            git fetch origin
            git reset --hard origin/master

            echo "🐍 Activating virtual environment..."
            source /home/ubuntu/apps/good-bingo/venv/bin/activate

            echo "📦 Installing dependencies..."
            pip install -r requirements.txt

            echo "🗃 Running migrations..."
            cd backend
            python manage.py migrate --noinput
            python manage.py collectstatic --noinput
            cd ..

            echo "🔄 Reloading systemd..."
            sudo systemctl daemon-reload

            echo "🔄 Restarting services (non-blocking)..."
            sudo systemctl restart gunicorn --no-block
            sudo systemctl restart bingo-telegram-bot --no-block
            sudo systemctl restart celery --no-block

            echo "✅ Deployment completed successfully!"


