name: Deploy Bingo App

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v0.1.6
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

                echo "🚀 Starting deployment..."

                cd /home/***/apps/arif_bingo

                echo "📥 Fetching repository..."
                git fetch origin

                # 🔍 Auto-detect default branch (main or master)
                if git show-ref --quiet refs/remotes/origin/main; then
                    BRANCH=main
                elif git show-ref --quiet refs/remotes/origin/master; then
                    BRANCH=master
                else
                    echo "❌ Neither origin/main nor origin/master exists"
                    exit 1
                fi

                echo "✅ Using branch: $BRANCH"

                git reset --hard origin/$BRANCH

                echo "✅ Deployed commit:"
                git log -1 --oneline

                echo "🐍 Activating virtual environment..."
                source backend/venv/bin/activate

                echo "📦 Installing backend dependencies..."
                pip install -r backend/requirements.txt

                echo "🗃 Running Django migrations & collectstatic..."
                cd backend
                python manage.py migrate --noinput
                python manage.py collectstatic --noinput
                cd ..

                echo "🔄 Reloading systemd..."
                sudo systemctl daemon-reload

                echo "🔄 Restarting services..."
                sudo systemctl restart gunicorn
                sudo systemctl restart celery
                sudo systemctl restart celery-beat || true

                echo "✅ Deployment completed successfully!"

