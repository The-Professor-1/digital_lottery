# Nginx for Car Lottery — markosgo.online
# Install on EC2:
#   sudo cp nginx/nginx.conf /etc/nginx/sites-available/carlottery
#   sudo ln -sf /etc/nginx/sites-available/carlottery /etc/nginx/sites-enabled/carlottery
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name markosgo.online www.markosgo.online;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name markosgo.online www.markosgo.online;

    ssl_certificate /etc/letsencrypt/live/markosgo.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/markosgo.online/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    access_log /var/log/nginx/carlottery_access.log;
    error_log /var/log/nginx/carlottery_error.log;

    client_max_body_size 10M;

    location /static/ {
        alias /home/ubuntu/apps/CarLottery/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Receipts + car uploads — through Django (avoids 403 from bad alias/path)
    location /media/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        expires 1d;
    }

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
